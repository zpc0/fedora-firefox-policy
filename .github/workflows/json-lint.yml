---
name: Lint json file
on: push
permissions: {}
jobs:
  json-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Install ESLint
        run: npm install --save-dev eslint@latest @eslint/json@latest
      - name: Run ESLint
        run: npx eslint policies.json
