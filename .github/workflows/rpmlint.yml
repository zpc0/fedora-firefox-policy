---
name: Lint RPM spec file
on: push
permissions: {}
jobs:
  rpmlint:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install rpmlint
        run: sudo dnf install -y rpmlint
      - name: Run rpmlint
        run: rpmlint firefox-policy.spec
